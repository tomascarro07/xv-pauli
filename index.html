<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Paulina · Mis XV</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Raleway:wght@300;400;500&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
:root{
  --rose:#d4607a;--rose-light:#e8a0b4;
  --sky:#5aacdc;
  --text:#2a3a50;--text2:#4a5a70;
  --seal:#d4849a;
}
body{
  background:linear-gradient(160deg,#fbe8f0 0%,#e8f4fc 60%,#fdf4f7 100%);
  font-family:'Cormorant Garamond',serif;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:100vh;min-height:100dvh;
  position:relative;overflow:hidden;
  padding:16px;
}

/* PÉTALOS */
#petals{position:fixed;inset:0;pointer-events:none;z-index:1;}
.petal{position:absolute;top:-20px;border-radius:60% 40% 55% 35%;animation:petalFall linear infinite;opacity:0;}
@keyframes petalFall{
  0%{transform:translateY(0) rotate(0deg) translateX(0);opacity:.65;}
  50%{transform:translateY(50vh) rotate(200deg) translateX(18px);opacity:.45;}
  100%{transform:translateY(108vh) rotate(380deg) translateX(-12px);opacity:0;}
}

/* HEADER */
.header-area{
  text-align:center;margin-bottom:20px;
  opacity:0;animation:fadeUp .9s .2s forwards;
  position:relative;z-index:10;
}
.header-date{
  font-family:'Raleway',sans-serif;
  font-size:clamp(10px,2.8vw,13px);
  letter-spacing:6px;color:var(--rose);
  text-transform:uppercase;margin-bottom:4px;
}
.header-name{
  font-family:'Dancing Script',cursive;
  font-size:clamp(56px,16vw,90px);
  color:var(--text);line-height:1.05;
}
.header-subtitle{
  font-family:'Playfair Display',serif;
  font-size:clamp(17px,4.5vw,24px);
  color:var(--text2);letter-spacing:3px;margin-top:2px;
}

/* ── ESCENA COMPLETA ── */
/* Usamos un wrapper que ocupa hasta el 92vw y máximo 500px */
.scene{
  position:relative;
  width:min(92vw, 500px);
  opacity:0;animation:fadeUp .9s .55s forwards;
  cursor:pointer;
  z-index:10;
  /* la altura la define el sobre SVG */
}

/* ── HOJA (carta completa) ── */
/* Está antes del SVG en el DOM. z-index la pone arriba cuando sube. */
.letter{
  position:absolute;
  left:14%;
  width:72%;
  /* empieza escondida dentro del sobre */
  top:28%;
  z-index:5;
  opacity:0;
  pointer-events:none;

  background:linear-gradient(175deg,#fff 0%,#fdf4f8 100%);
  border-radius:4px 4px 3px 3px;
  border:1px solid rgba(212,96,122,.18);
  box-shadow:0 -4px 28px rgba(212,96,122,.14), 0 2px 12px rgba(0,0,0,.07);

  /* altura auto para que el contenido no se corte */
  height:auto;
  min-height:58%;

  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:8px;padding:20px 12px 22px;
  text-align:center;
  overflow:visible;
}

/* líneas decorativas en la hoja */
.letter::before{
  content:'';position:absolute;top:14px;left:14px;right:14px;
  height:1px;background:linear-gradient(90deg,transparent,rgba(212,96,122,.25),transparent);
}
.letter::after{
  content:'';position:absolute;bottom:14px;left:14px;right:14px;
  height:1px;background:linear-gradient(90deg,transparent,rgba(212,96,122,.25),transparent);
}
.letter-ornament{font-size:clamp(22px,5vw,28px);}
.letter-name{
  font-family:'Dancing Script',cursive;
  font-size:clamp(26px,7vw,38px);
  color:var(--rose);line-height:1;
}
.letter-msg{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(13px,3.2vw,16px);
  color:var(--text2);letter-spacing:2px;
  font-style:italic;line-height:1.5;
}
.letter-date{
  font-family:'Raleway',sans-serif;
  font-size:clamp(10px,2.5vw,12px);
  letter-spacing:4px;color:var(--rose);
  text-transform:uppercase;margin-top:4px;
}
.letter-xv{
  font-family:'Playfair Display',serif;
  font-size:clamp(32px,9vw,52px);
  font-weight:600;
  background:linear-gradient(135deg,var(--sky),var(--rose));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;
}

/* ── SVG SOBRE ── */
.envelope-wrap{
  position:relative;
  z-index:20;   /* encima de la carta hasta que sube */
  width:100%;
}
.envelope-svg{width:100%;display:block;filter:drop-shadow(0 14px 32px rgba(212,96,122,.18));}

/* FLAP */
.flap{transform-box:fill-box;transform-origin:50% 0%;}

/* ── SELLO ── */
.seal-wrap{
  position:absolute;
  left:50%;bottom:32%;
  transform:translateX(-50%);
  z-index:25;
}
.seal-circle{
  width:clamp(68px,16vw,84px);
  height:clamp(68px,16vw,84px);
  border-radius:50%;
  background:radial-gradient(circle at 38% 35%,#e8a4b8,var(--seal) 55%,#b86880);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(180,80,100,.3),inset 0 1px 3px rgba(255,255,255,.4);
  position:relative;
}
.seal-icon{font-size:clamp(20px,5vw,26px);position:relative;z-index:2;}

/* ── ANIMACIONES ── */
@keyframes flapOpen{
  0%  {transform:rotateX(0deg);}
  100%{transform:rotateX(-175deg);}
}
@keyframes sealPop{
  0%  {transform:translateX(-50%) scale(1);opacity:1;}
  35% {transform:translateX(-50%) scale(1.18);opacity:.7;}
  100%{transform:translateX(-50%) scale(0);opacity:0;}
}
/* La carta sube desde dentro y pasa POR ENCIMA del sobre */
@keyframes letterRise{
  0%  {transform:translateY(0) scale(.97);opacity:0;}
  20% {opacity:1;}
  100%{transform:translateY(-52%) scale(1);opacity:1;}
}
@keyframes envelopeExit{
  to{transform:scale(.88) translateY(16px);opacity:0;}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

/* Clases de estado */
.opening .flap     {animation:flapOpen   1.1s  .1s  cubic-bezier(.4,0,.2,1) forwards;}
.opening .seal-wrap{animation:sealPop    .55s  .05s ease-in               forwards;}
.opening .letter   {animation:letterRise 1.4s  .9s  cubic-bezier(.2,.8,.3,1) forwards;}
.done              {animation:envelopeExit .55s .1s ease-in               forwards;}

/* hover sello */
.scene:not(.opening) .seal-wrap{transition:transform .2s;}
.scene:hover:not(.opening) .seal-wrap{transform:translateX(-50%) scale(1.08);}

/* HINT */
.tap-hint{
  margin-top:14px;text-align:center;
  font-family:'Raleway',sans-serif;
  font-size:clamp(9px,2.5vw,11px);
  letter-spacing:4px;color:rgba(42,58,80,.36);
  text-transform:uppercase;
  opacity:0;animation:fadeUp .9s 1.1s forwards;
  position:relative;z-index:10;transition:opacity .3s;
}

/* FOOTER */
.footer-text{
  margin-top:16px;text-align:center;
  font-family:'Playfair Display',serif;
  font-size:clamp(15px,4vw,21px);
  font-style:italic;color:var(--text2);
  opacity:0;animation:fadeUp .9s .85s forwards;
  position:relative;z-index:10;
}

/* OVERLAY */
#overlay{
  position:fixed;inset:0;
  background:linear-gradient(160deg,#fbe8f0,#e8f4fc);
  opacity:0;pointer-events:none;z-index:100;
  transition:opacity .65s ease;
}
#overlay.fade-in{opacity:1;pointer-events:all;}
</style>
</head>
<body>
<div id="petals"></div>
<div id="overlay"></div>

<div class="header-area">
  <p class="header-date">05 · 06 · 2025</p>
  <h1 class="header-name">Paulina</h1>
  <p class="header-subtitle" style="opacity:0;animation:fadeUp .9s .5s forwards;">Mis XV</p>
</div>

<div class="scene" id="scene" onclick="openEnvelope()">

  <!-- 1. HOJA COMPLETA — en el DOM primero, z-index la sube al animarse -->
  <div class="letter" id="letter">
    <span class="letter-ornament">🌸</span>
    <span class="letter-xv">XV</span>
    <span class="letter-name">Paulina</span>
    <span class="letter-msg">Te invito a compartir<br/>la noche más especial<br/>de mi vida</span>
    <span class="letter-date">Jueves 5 de Junio · 21:00 hs</span>
  </div>

  <!-- 2. SELLO -->
  <div class="seal-wrap" id="seal-wrap">
    <div class="seal-circle">
      <svg viewBox="0 0 84 84" style="position:absolute;inset:0;width:100%;height:100%;">
        <defs>
          <path id="cp" d="M42,42 m-30,0 a30,30 0 1,1 60,0 a30,30 0 1,1 -60,0"/>
        </defs>
        <text font-family="Raleway,sans-serif" font-size="6.2" fill="rgba(42,30,36,0.58)" letter-spacing="1.3">
          <textPath href="#cp" startOffset="2%">Tocá aquí · para ver la invitación ·</textPath>
        </text>
      </svg>
      <span class="seal-icon">🌿</span>
    </div>
  </div>

  <!-- 3. SVG SOBRE — encima mientras la carta no sube -->
  <div class="envelope-wrap" id="envelope-wrap">
    <svg class="envelope-svg" viewBox="0 0 500 380" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="envG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f9eeea"/>
          <stop offset="100%" stop-color="#efdbcf"/>
        </linearGradient>
        <linearGradient id="flapG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f2dfd6"/>
          <stop offset="100%" stop-color="#e6cdc0"/>
        </linearGradient>
        <filter id="sh">
          <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(212,96,122,0.14)"/>
        </filter>
      </defs>

      <!-- Cuerpo -->
      <rect x="14" y="80" width="472" height="288" rx="16" fill="url(#envG)" filter="url(#sh)"/>

      <!-- Triángulos de doblez laterales e inferior -->
      <polygon points="14,80  250,230  14,368"  fill="#ecddd4" opacity=".5"/>
      <polygon points="486,80 250,230 486,368"  fill="#ecddd4" opacity=".5"/>
      <polygon points="14,368 250,248 486,368"  fill="#e4cfc4" opacity=".6"/>

      <!-- Líneas de doblez -->
      <line x1="14"  y1="80"  x2="250" y2="230" stroke="rgba(200,145,125,.2)" stroke-width="1"/>
      <line x1="486" y1="80"  x2="250" y2="230" stroke="rgba(200,145,125,.2)" stroke-width="1"/>

      <!-- FLAP animable -->
      <g class="flap" style="transform-origin:250px 80px;">
        <polygon points="14,82 250,220 486,82" fill="url(#flapG)"/>
        <line x1="14" y1="82" x2="486" y2="82" stroke="rgba(200,145,125,.16)" stroke-width="1"/>
      </g>

      <!-- Borde -->
      <rect x="14" y="80" width="472" height="288" rx="16" fill="none" stroke="rgba(212,150,130,.18)" stroke-width="1.5"/>

      <!-- "Mis XV" manuscrita -->
      <text x="250" y="310" text-anchor="middle"
        font-family="'Dancing Script',cursive" font-size="34"
        fill="rgba(42,58,80,.32)" transform="rotate(-2,250,310)">Mis XV</text>
    </svg>
  </div>

</div>

<p class="tap-hint" id="tap-hint">tocá el sobre para abrirlo ✦</p>
<p class="footer-text">¡Guardamos un lugar para vos!</p>

<script>
/* PÉTALOS */
(function(){
  const c=document.getElementById('petals');
  const cols=['#a8d8f0','#e8a0b4','#5aacdc','#f0c8d8','#90ccee','#d4607a','#f5d0dc'];
  for(let i=0;i<28;i++){
    const p=document.createElement('div');p.className='petal';
    const s=6+Math.random()*9;
    p.style.cssText=[
      'left:'+(Math.random()*100)+'vw',
      'width:'+s+'px','height:'+(s*1.4)+'px',
      'background:'+cols[Math.floor(Math.random()*cols.length)],
      'animation-duration:'+(5+Math.random()*7)+'s',
      'animation-delay:'+(-Math.random()*8)+'s',
      'border-radius:'+(48+Math.random()*20)+'% '+(38+Math.random()*20)+'% '+(52+Math.random()*18)+'% '+(34+Math.random()*18)+'%'
    ].join(';');
    c.appendChild(p);
  }
})();

/* ABRIR SOBRE */
let opened=false;
function openEnvelope(){
  if(opened)return;
  opened=true;
  document.getElementById('tap-hint').style.opacity='0';

  const scene=document.getElementById('scene');
  const letter=document.getElementById('letter');
  const envWrap=document.getElementById('envelope-wrap');

  scene.classList.add('opening');

  // A los 900ms (flap ya abierto) la carta sube POR ENCIMA del sobre
  setTimeout(()=>{
    letter.style.zIndex='35';
    envWrap.style.zIndex='15';
  }, 900);

  // A los 3500ms → la carta se leyó, ahora fade y navegar
  setTimeout(()=>{
    scene.classList.add('done');
    document.getElementById('overlay').classList.add('fade-in');
    setTimeout(()=>{ window.location.href='invitacion.html'; }, 750);
  }, 3500);
}
</script>
</body>
</html>
