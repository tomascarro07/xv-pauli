<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Paulina · Mis XV</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Raleway:wght@300;400;500&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
:root{
  --rose:#d4607a;--rose-light:#e8a0b4;
  --sky:#5aacdc;
  --text:#2a3a50;--text2:#4a5a70;
  --seal:#d4849a;
}
body{
  background:linear-gradient(160deg,#fbe8f0 0%,#e8f4fc 60%,#fdf4f7 100%);
  font-family:'Cormorant Garamond',serif;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:100vh;
  position:relative;overflow:hidden;
}

/* PÉTALOS */
#petals{position:fixed;inset:0;pointer-events:none;z-index:1;}
.petal{position:absolute;top:-20px;border-radius:60% 40% 55% 35%;animation:petalFall linear infinite;opacity:0;}
@keyframes petalFall{
  0%{transform:translateY(0) rotate(0deg) translateX(0);opacity:.65;}
  50%{transform:translateY(50vh) rotate(200deg) translateX(18px);opacity:.45;}
  100%{transform:translateY(108vh) rotate(380deg) translateX(-12px);opacity:0;}
}

/* HEADER */
.header-area{
  text-align:center;margin-bottom:28px;
  opacity:0;animation:fadeUp .9s .2s forwards;
  position:relative;z-index:10;
}
.header-date{font-family:'Raleway',sans-serif;font-size:12px;letter-spacing:6px;color:var(--rose);text-transform:uppercase;margin-bottom:6px;}
.header-name{font-family:'Dancing Script',cursive;font-size:clamp(48px,12vw,76px);color:var(--text);line-height:1;}
.header-subtitle{font-family:'Playfair Display',serif;font-size:clamp(16px,3.5vw,22px);color:var(--text2);letter-spacing:3px;margin-top:2px;}

/* ESCENA — contenedor general del sobre + carta */
.envelope-scene{
  position:relative;
  width:clamp(300px,85vw,460px);
  opacity:0;animation:fadeUp .9s .55s forwards;
  cursor:pointer;
  z-index:10;
}

/* CARTA — z-index alto, sale POR ENCIMA del sobre */
.letter{
  position:absolute;
  left:10%;width:80%;
  /* empieza dentro del sobre: parte inferior, oculta */
  bottom:10%;
  z-index:30;              /* ← por encima del SVG */
  background:linear-gradient(170deg,#fff 0%,#fdf4f7 100%);
  border-radius:8px 8px 4px 4px;
  padding:20px 16px 16px;
  text-align:center;
  box-shadow:0 -6px 28px rgba(212,96,122,.15),0 2px 8px rgba(0,0,0,.08);
  border:1px solid rgba(212,96,122,.18);
  opacity:0;
  pointer-events:none;
  transform:translateY(0) scale(.96);
}
.letter-inner-name{font-family:'Dancing Script',cursive;font-size:24px;color:var(--rose);display:block;margin-bottom:3px;}
.letter-inner-text{font-family:'Raleway',sans-serif;font-size:10px;color:var(--text2);letter-spacing:3px;text-transform:uppercase;}

/* SVG sobre — z-index MEDIO, encima del fondo pero debajo de la carta cuando sube */
.envelope-svg-wrap{
  position:relative;
  z-index:20;
  width:100%;
}
.envelope-svg{width:100%;display:block;filter:drop-shadow(0 16px 36px rgba(212,96,122,.2));}

/* FLAP — se dobla hacia atrás al abrir */
.flap{
  transform-origin:50% 0%;
  transform-box:fill-box;
  transition:none;
}

/* SELLO — encima del SVG */
.seal-wrap{
  position:absolute;
  left:50%;
  /* lo posicionamos sobre el doblez del sobre: ~42% desde abajo del wrap */
  bottom:38%;
  transform:translateX(-50%);
  z-index:25;
}
.seal-circle{
  width:76px;height:76px;border-radius:50%;
  background:radial-gradient(circle at 38% 35%,#e8a4b8,var(--seal) 55%,#b86880);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(180,80,100,.3),inset 0 1px 3px rgba(255,255,255,.4);
  position:relative;
}
.seal-icon{font-size:24px;position:relative;z-index:2;filter:drop-shadow(0 1px 2px rgba(0,0,0,.15));}

/* ANIMACIONES */
@keyframes flapOpen{
  0%  {transform:rotateX(0deg);opacity:1;}
  100%{transform:rotateX(-175deg);opacity:.85;}
}
@keyframes letterRise{
  0%  {transform:translateY(0) scale(.96);opacity:0;}
  30% {opacity:1;}
  100%{transform:translateY(-95%) scale(1);opacity:1;}
}
@keyframes sealPop{
  0%  {transform:translateX(-50%) scale(1);opacity:1;}
  40% {transform:translateX(-50%) scale(1.15);opacity:.8;}
  100%{transform:translateX(-50%) scale(0);opacity:0;}
}
@keyframes envelopeExit{
  to{transform:scale(.88) translateY(18px);opacity:0;}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* Estados al abrir */
.opening .flap        {animation:flapOpen  .55s .05s cubic-bezier(.4,0,.2,1) forwards;}
.opening .seal-wrap   {animation:sealPop   .35s .0s  ease-in               forwards;}
.opening .letter      {animation:letterRise .7s .4s  cubic-bezier(.2,.8,.3,1) forwards;}
.done                 {animation:envelopeExit .5s .1s ease-in               forwards;}

/* HOVER sello */
.envelope-scene:not(.opening) .seal-wrap{transition:transform .2s;}
.envelope-scene:hover:not(.opening) .seal-wrap{transform:translateX(-50%) scale(1.08);}

/* HINT */
.tap-hint{
  margin-top:18px;text-align:center;
  font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:4px;
  color:rgba(42,58,80,.38);text-transform:uppercase;
  opacity:0;animation:fadeUp .9s 1.1s forwards;
  position:relative;z-index:10;transition:opacity .3s;
}

/* FOOTER */
.footer-text{
  margin-top:22px;text-align:center;
  font-family:'Playfair Display',serif;font-size:clamp(16px,3.5vw,21px);
  font-style:italic;color:var(--text2);
  opacity:0;animation:fadeUp .9s .85s forwards;
  position:relative;z-index:10;
}

/* OVERLAY */
#overlay{
  position:fixed;inset:0;
  background:linear-gradient(160deg,#fbe8f0,#e8f4fc);
  opacity:0;pointer-events:none;z-index:100;
  transition:opacity .65s ease;
}
#overlay.fade-in{opacity:1;pointer-events:all;}
</style>
</head>
<body>
<div id="petals"></div>
<div id="overlay"></div>

<div class="header-area">
  <p class="header-date">05 · 06 · 2025</p>
  <h1 class="header-name">Paulina</h1>
  <p class="header-subtitle">Mis XV</p>
</div>

<div class="envelope-scene" id="envelope" onclick="openEnvelope()">

  <!-- 1. CARTA — en el DOM antes del SVG para que el z-index funcione bien -->
  <div class="letter" id="letter">
    <span class="letter-inner-name">Paulina</span>
    <span class="letter-inner-text">Mis XV Años · 5 de Junio</span>
  </div>

  <!-- 2. SELLO — encima del SVG -->
  <div class="seal-wrap" id="seal-wrap">
    <div class="seal-circle">
      <svg viewBox="0 0 76 76" style="position:absolute;inset:0;width:100%;height:100%;">
        <defs>
          <path id="cp" d="M38,38 m-27,0 a27,27 0 1,1 54,0 a27,27 0 1,1 -54,0"/>
        </defs>
        <text font-family="Raleway,sans-serif" font-size="6" fill="rgba(42,30,36,0.6)" letter-spacing="1.4">
          <textPath href="#cp" startOffset="3%">Haz clic aquí · para ver la invitación ·</textPath>
        </text>
      </svg>
      <span class="seal-icon">🌿</span>
    </div>
  </div>

  <!-- 3. SVG SOBRE — va encima de la carta inicialmente -->
  <div class="envelope-svg-wrap">
    <svg class="envelope-svg" viewBox="0 0 460 300" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="envG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f9eeea"/>
          <stop offset="100%" stop-color="#f0ddd2"/>
        </linearGradient>
        <linearGradient id="flapG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f2e0d8"/>
          <stop offset="100%" stop-color="#e8d0c4"/>
        </linearGradient>
        <filter id="sh" x="-10%" y="-10%" width="120%" height="130%">
          <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(212,96,122,0.14)"/>
        </filter>
      </defs>

      <!-- Cuerpo -->
      <rect x="12" y="72" width="436" height="218" rx="14" fill="url(#envG)" filter="url(#sh)"/>

      <!-- Triángulos interiores de doblez -->
      <polygon points="12,72  230,198  12,290"  fill="#ecddd6" opacity=".55"/>
      <polygon points="448,72 230,198 448,290"  fill="#ecddd6" opacity=".55"/>
      <polygon points="12,290 230,188 448,290"  fill="#e4d0c6" opacity=".65"/>

      <!-- Líneas de doblez -->
      <line x1="12"  y1="72"  x2="230" y2="198" stroke="rgba(200,145,125,.22)" stroke-width="1"/>
      <line x1="448" y1="72"  x2="230" y2="198" stroke="rgba(200,145,125,.22)" stroke-width="1"/>

      <!-- FLAP — grupo animable con transform-box -->
      <g class="flap" style="transform-origin:230px 72px;">
        <polygon points="12,74 230,192 448,74" fill="url(#flapG)"/>
        <line x1="12" y1="74" x2="448" y2="74" stroke="rgba(200,145,125,.18)" stroke-width="1"/>
      </g>

      <!-- Borde exterior -->
      <rect x="12" y="72" width="436" height="218" rx="14" fill="none" stroke="rgba(212,150,130,.18)" stroke-width="1.5"/>

      <!-- "Mis XV" manuscrita, centrada en la mitad inferior del sobre -->
      <text x="230" y="242" text-anchor="middle"
        font-family="'Dancing Script',cursive" font-size="32"
        fill="rgba(42,58,80,.38)" transform="rotate(-2,230,242)">Mis XV</text>
    </svg>
  </div>

</div>

<p class="tap-hint" id="tap-hint">tocá el sobre para abrirlo ✦</p>
<p class="footer-text">¡Guardamos un lugar para vos!</p>

<script>
/* PÉTALOS */
(function(){
  const c=document.getElementById('petals');
  const cols=['#a8d8f0','#e8a0b4','#5aacdc','#f0c8d8','#90ccee','#d4607a','#f5d0dc'];
  for(let i=0;i<28;i++){
    const p=document.createElement('div'); p.className='petal';
    const s=6+Math.random()*9;
    p.style.cssText=[
      'left:'+(Math.random()*100)+'vw',
      'width:'+s+'px','height:'+(s*1.4)+'px',
      'background:'+cols[Math.floor(Math.random()*cols.length)],
      'animation-duration:'+(5+Math.random()*7)+'s',
      'animation-delay:'+(-Math.random()*8)+'s',
      'border-radius:'+(48+Math.random()*20)+'% '+(38+Math.random()*20)+'% '+(52+Math.random()*18)+'% '+(34+Math.random()*18)+'%'
    ].join(';');
    c.appendChild(p);
  }
})();

/* ABRIR SOBRE */
let opened=false;
function openEnvelope(){
  if(opened) return;
  opened=true;
  document.getElementById('tap-hint').style.opacity='0';
  const env=document.getElementById('envelope');
  env.classList.add('opening');

  // Cuando la carta termina de subir → hacer el sobre desaparecer y navegar
  setTimeout(()=>{
    env.classList.add('done');
    document.getElementById('overlay').classList.add('fade-in');
    setTimeout(()=>{ window.location.href='invitacion.html'; },680);
  },1150);
}
</script>
</body>
</html>
