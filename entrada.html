<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Paulina · Mis XV</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Raleway:wght@300;400;500&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}

:root{
  --rose:#d4607a;--rose-light:#e8a0b4;--rose-pale:#fce8ef;
  --sky:#5aacdc;--sky-light:#a8d8f0;
  --cream:#fff8f4;--text:#2a3a50;--text2:#4a5a70;
  --envelope:#f7ede6;--envelope-dark:#f0ddd2;--seal:#d4849a;
}

body{
  background:linear-gradient(160deg,#fbe8f0 0%,#e8f4fc 60%,#fdf4f7 100%);
  font-family:'Cormorant Garamond',serif;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:100vh;
  position:relative;overflow:hidden;
}

/* ── PÉTALOS ── */
#petals{position:fixed;inset:0;pointer-events:none;z-index:1;}
.petal{position:absolute;top:-20px;border-radius:60% 40% 55% 35%;animation:petalFall linear infinite;opacity:0;}
@keyframes petalFall{
  0%{transform:translateY(0) rotate(0deg) translateX(0);opacity:.65;}
  50%{transform:translateY(50vh) rotate(200deg) translateX(18px);opacity:.45;}
  100%{transform:translateY(108vh) rotate(380deg) translateX(-12px);opacity:0;}
}

/* ── HEADER TEXT ── */
.header-area{
  text-align:center;margin-bottom:36px;
  opacity:0;animation:fadeUp .9s .2s forwards;
  position:relative;z-index:10;
}
.header-date{
  font-family:'Raleway',sans-serif;font-size:13px;letter-spacing:6px;
  color:var(--rose);text-transform:uppercase;margin-bottom:8px;
}
.header-name{
  font-family:'Dancing Script',cursive;font-size:clamp(52px,14vw,82px);
  color:var(--text);line-height:1;
  text-shadow:0 2px 24px rgba(212,96,122,.15);
}
.header-subtitle{
  font-family:'Playfair Display',serif;font-size:clamp(18px,4vw,24px);
  color:var(--text2);letter-spacing:3px;margin-top:4px;font-weight:400;
}

/* ── SOBRE ── */
.envelope-scene{
  position:relative;z-index:10;
  width:clamp(280px,80vw,380px);
  opacity:0;animation:fadeUp .9s .55s forwards;
  cursor:pointer;
}

.envelope-scene.opening .flap{animation:flapOpen .6s cubic-bezier(.4,0,.2,1) forwards;}
.envelope-scene.opening .letter{animation:letterRise .7s .4s cubic-bezier(.4,0,.2,1) forwards;}
.envelope-scene.opening .seal-wrap{animation:sealFade .3s forwards;}
.envelope-scene.done{animation:envelopeExit .5s .1s forwards;}

/* SVG sobre */
.envelope-svg{width:100%;filter:drop-shadow(0 18px 40px rgba(212,96,122,.18));}

/* FLAP animable */
.flap{transform-origin:center top;transform-box:fill-box;}
@keyframes flapOpen{
  0%{transform:rotateX(0deg);}
  100%{transform:rotateX(-180deg);}
}

/* CARTA que sube */
.letter{
  position:absolute;
  left:12%;width:76%;
  bottom:38%;
  background:linear-gradient(170deg,#fff 0%,#fdf4f7 100%);
  border-radius:6px 6px 4px 4px;
  padding:18px 14px 14px;
  text-align:center;
  box-shadow:0 -4px 24px rgba(212,96,122,.1);
  transform:translateY(0px) scale(.95);
  opacity:0;
  pointer-events:none;
  border:1px solid rgba(212,96,122,.15);
}
@keyframes letterRise{
  0%{transform:translateY(0) scale(.95);opacity:0;}
  100%{transform:translateY(-88%) scale(1);opacity:1;}
}
.letter-inner-name{
  font-family:'Dancing Script',cursive;font-size:22px;color:var(--rose);
  display:block;margin-bottom:2px;
}
.letter-inner-text{
  font-family:'Cormorant Garamond',serif;font-size:12px;
  color:var(--text2);letter-spacing:2px;text-transform:uppercase;
}

/* SELLO */
.seal-wrap{
  position:absolute;
  left:50%;bottom:29%;
  transform:translateX(-50%);
  z-index:20;
  transition:transform .2s;
}
.envelope-scene:hover:not(.opening) .seal-wrap{transform:translateX(-50%) scale(1.07);}
@keyframes sealFade{to{opacity:0;transform:translateX(-50%) scale(1.3);}}

.seal-circle{
  width:72px;height:72px;border-radius:50%;
  background:radial-gradient(circle at 38% 35%,#e8a4b8,var(--seal) 55%,#b86880);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(180,80,100,.3),inset 0 1px 3px rgba(255,255,255,.4);
  position:relative;
}
.seal-text{
  position:absolute;inset:0;
  font-family:'Raleway',sans-serif;font-size:7.5px;letter-spacing:1.8px;
  color:rgba(42,30,36,.7);text-transform:uppercase;
  display:flex;align-items:center;justify-content:center;
}
.seal-text svg{position:absolute;inset:0;width:100%;height:100%;}
.seal-icon{font-size:22px;position:relative;z-index:2;filter:drop-shadow(0 1px 2px rgba(0,0,0,.2));}

/* HINT */
.tap-hint{
  margin-top:22px;text-align:center;
  font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:4px;
  color:rgba(42,58,80,.4);text-transform:uppercase;
  opacity:0;animation:fadeUp .9s 1s forwards;
  position:relative;z-index:10;
  transition:opacity .3s;
}
.envelope-scene.opening ~ .tap-hint{opacity:0 !important;}

/* FOOTER TEXT */
.footer-text{
  margin-top:28px;text-align:center;
  font-family:'Playfair Display',serif;font-size:clamp(17px,4vw,22px);
  font-style:italic;color:var(--text2);
  opacity:0;animation:fadeUp .9s .8s forwards;
  position:relative;z-index:10;
}

/* ── OVERLAY de transición ── */
#overlay{
  position:fixed;inset:0;
  background:linear-gradient(160deg,#fbe8f0,#e8f4fc);
  opacity:0;pointer-events:none;z-index:100;
  transition:opacity .6s ease;
}
#overlay.fade-in{opacity:1;pointer-events:all;}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes envelopeExit{to{transform:scale(.9) translateY(20px);opacity:0;}}
</style>
</head>
<body>

<div id="petals"></div>
<div id="overlay"></div>

<div class="header-area">
  <p class="header-date">05 · 06 · 2025</p>
  <h1 class="header-name">Paulina</h1>
  <p class="header-subtitle">Mis XV</p>
</div>

<!-- SOBRE -->
<div class="envelope-scene" id="envelope" onclick="openEnvelope()">

  <!-- Carta que asoma -->
  <div class="letter">
    <span class="letter-inner-name">Paulina</span>
    <span class="letter-inner-text">Mis XV Años · 5 de Junio</span>
  </div>

  <!-- Sello -->
  <div class="seal-wrap" id="seal-wrap">
    <div class="seal-circle">
      <!-- texto circular SVG -->
      <svg viewBox="0 0 72 72" style="position:absolute;inset:0;width:100%;height:100%;">
        <defs>
          <path id="circle-path" d="M36,36 m-26,0 a26,26 0 1,1 52,0 a26,26 0 1,1 -52,0"/>
        </defs>
        <text font-family="Raleway,sans-serif" font-size="6.2" fill="rgba(42,30,36,0.65)" letter-spacing="1.6">
          <textPath href="#circle-path" startOffset="5%">Haz clic aquí para ver la invitación</textPath>
        </text>
      </svg>
      <span class="seal-icon">🌿</span>
    </div>
  </div>

  <!-- SVG del sobre -->
  <svg class="envelope-svg" viewBox="0 0 380 260" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="envGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#f9eeea"/>
        <stop offset="100%" stop-color="#f0ddd2"/>
      </linearGradient>
      <linearGradient id="flapGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#f5e4dc"/>
        <stop offset="100%" stop-color="#edd4c8"/>
      </linearGradient>
      <filter id="shadow">
        <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(212,96,122,0.15)"/>
      </filter>
    </defs>

    <!-- Cuerpo del sobre -->
    <rect x="10" y="60" width="360" height="190" rx="12" fill="url(#envGrad)" filter="url(#shadow)"/>

    <!-- Triángulos laterales (interior) -->
    <polygon points="10,60 190,170 10,250" fill="#ecddd6" opacity=".6"/>
    <polygon points="370,60 190,170 370,250" fill="#ecddd6" opacity=".6"/>
    <!-- Triángulo inferior -->
    <polygon points="10,250 190,155 370,250" fill="#e8d4cc" opacity=".7"/>

    <!-- Líneas de doblez sutiles -->
    <line x1="10" y1="60" x2="190" y2="170" stroke="rgba(200,150,130,.25)" stroke-width="1"/>
    <line x1="370" y1="60" x2="190" y2="170" stroke="rgba(200,150,130,.25)" stroke-width="1"/>

    <!-- Flap superior (animable) -->
    <polygon class="flap" points="10,62 190,165 370,62" fill="url(#flapGrad)" stroke="rgba(200,150,130,.2)" stroke-width="1"/>

    <!-- Borde exterior -->
    <rect x="10" y="60" width="360" height="190" rx="12" fill="none" stroke="rgba(212,150,130,.2)" stroke-width="1.5"/>

    <!-- Texto manuscrito "MIS XV" -->
    <text x="190" y="185" text-anchor="middle"
      font-family="Dancing Script, cursive" font-size="28"
      fill="rgba(42,58,80,.45)" transform="rotate(-3,190,185)">Mis XV</text>
  </svg>

</div>

<p class="tap-hint" id="tap-hint">toca el sobre para abrir ✦</p>

<p class="footer-text">¡Guardamos un lugar para vos!</p>

<script>
/* PÉTALOS */
(function(){
  const c=document.getElementById('petals');
  const cols=['#a8d8f0','#e8a0b4','#5aacdc','#f0c8d8','#90ccee','#d4607a','#f5d0dc'];
  for(let i=0;i<28;i++){
    const p=document.createElement('div'); p.className='petal';
    const s=6+Math.random()*9;
    p.style.cssText=[
      'left:'+(Math.random()*100)+'vw',
      'width:'+s+'px','height:'+(s*1.4)+'px',
      'background:'+cols[Math.floor(Math.random()*cols.length)],
      'animation-duration:'+(5+Math.random()*7)+'s',
      'animation-delay:'+(-Math.random()*8)+'s',
      'border-radius:'+(48+Math.random()*20)+'% '+(38+Math.random()*20)+'% '+(52+Math.random()*18)+'% '+(34+Math.random()*18)+'%'
    ].join(';');
    c.appendChild(p);
  }
})();

/* ABRIR SOBRE */
let opened = false;
function openEnvelope(){
  if(opened) return;
  opened = true;

  const env = document.getElementById('envelope');
  const hint = document.getElementById('tap-hint');
  hint.style.opacity = '0';
  env.classList.add('opening');

  // Después de la animación → fade y navegar
  setTimeout(()=>{
    env.classList.add('done');
    const overlay = document.getElementById('overlay');
    overlay.classList.add('fade-in');
    setTimeout(()=>{ window.location.href = 'index.html'; }, 650);
  }, 1100);
}
</script>
</body>
</html>
